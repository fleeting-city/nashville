<style>
:root{--ink:#0e0d10;--ink2:#16151a;--ink3:#201f26;--cream:#f6f1e7;--dim:#8a8794;--red:#E64535;--neon:#ff5a3c;--gold:#f0b429}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--ink);color:var(--cream);font-family:Archivo,system-ui,sans-serif}
#app{display:grid;grid-template-columns:352px 1fr;height:100vh}
#panel{background:linear-gradient(180deg,#141318,#0e0d10);border-right:1px solid #26242e;overflow-y:auto;padding:18px 16px}
#map{height:100vh}
.wm{font-family:'Archivo Black',sans-serif;font-size:26px;letter-spacing:.5px;line-height:1}
.wm .p{color:var(--red)}
.sub{color:var(--dim);font-size:12px;margin:6px 0 14px;letter-spacing:.3px}
h3{font-family:'Archivo Black',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:20px 0 8px;display:flex;justify-content:space-between;align-items:baseline}
h3 .rst{font-family:Archivo;font-weight:600;font-size:10px;letter-spacing:.5px;color:var(--dim);cursor:pointer;text-transform:none}
.loc{display:flex;gap:6px;margin-bottom:8px}
.loc select{flex:1;background:var(--ink2);color:var(--cream);border:1px solid #2c2a34;border-radius:8px;padding:7px 8px;font-family:Archivo;font-size:12px}
.loc button{background:var(--ink2);color:var(--neon);border:1px solid #33313c;border-radius:8px;padding:7px 9px;font-size:12px;cursor:pointer;white-space:nowrap}
.loc button:hover{border-color:var(--neon)}
.lyr{display:flex;gap:6px;margin:8px 0 2px}
.lyrpill{flex:1;text-align:center;padding:6px 4px;border:1px solid #2c2a34;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.3px;color:#55535e;background:var(--ink2);cursor:pointer;user-select:none}
.lyrpill.on{color:var(--cream)}

.strip{margin-top:8px;font-size:0}.strip i{display:inline-block;width:8px;height:8px;margin:0 3px 0 0;background:#3a3842}.strip i.on{background:var(--red)}
.wk{background:var(--ink2);border:1px solid #2c2a34;border-radius:10px;padding:6px 12px 10px;margin-bottom:6px}

.wkr.ev .mi{color:var(--gold)}.wkr.fm .mi{color:var(--neon)}
.lc{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin:0 0 4px;border-radius:8px;background:var(--ink2);border:1px solid #24232c;border-left:3px solid #33313c;cursor:pointer;transition:.12s}
.lc:hover{border-color:#3a3842}.lc.on{outline:1px solid var(--neon);border-left-color:var(--neon)}
.lc .l{display:flex;flex-direction:column}.lc .cn{font-weight:700;font-size:13px}.lc .ct{font-size:10.5px;color:var(--dim);margin-top:1px}
.lc .st{font-size:11px;font-weight:700;text-align:right;white-space:nowrap}
.lc-closing{border-left-color:var(--red)}.lc-closing .st{color:var(--red)}
.lc-peak{border-left-color:var(--neon)}.lc-peak .st{color:var(--neon)}
.lc-soon{border-left-color:var(--gold)}.lc-soon .st{color:var(--gold)}
.lc-gone{opacity:.5}.lc-gone .cn{text-decoration:line-through;text-decoration-color:#55535e}.lc-gone .st{color:var(--dim)}
.lc-none .st{color:var(--dim)}

.tog .sw{width:34px;height:18px;background:#33313c;border-radius:20px;position:relative;transition:.15s;flex:none}
.tog .sw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#0e0d10;transition:.15s}
.tog.on .sw{background:var(--neon)}.tog.on .sw::after{left:18px}

.count{color:var(--dim);font-size:11px;margin:2px 0 4px}
.foot{color:var(--dim);font-size:10.5px;line-height:1.5;margin-top:22px;border-top:1px solid #22212a;padding-top:12px}
.leaflet-popup-content-wrapper{background:var(--ink2);color:var(--cream);border-radius:10px;border:1px solid #2c2a34}
.leaflet-popup-tip{background:var(--ink2)}
.pop b{font-family:'Archivo Black',sans-serif;font-size:13px}.pop .m{color:var(--gold);font-size:11px;margin:3px 0}.pop .w{color:var(--dim);font-size:11px}
.legend{position:absolute;z-index:500;right:12px;bottom:12px;background:rgba(20,19,24,.92);border:1px solid #2c2a34;border-radius:8px;padding:8px 10px;font-size:11px;color:var(--dim)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

let LOC={lat:TOWNS['Nashville'][0],lon:TOWNS['Nashville'][1],label:'Nashville'}, radiusMi=40, active=new Set(), nowOnly=false;
function hav(la1,lo1,la2,lo2){let R=3959,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;let a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(a))}
function distF(f){return LOC?hav(LOC.lat,LOC.lon,f.lat,f.lon):0}
function withinR(f){return !radiusMi||!LOC||distF(f)<=radiusMi}
function inWin(rng){if(!rng)return false;let p=rng.split("-");let a=MON.indexOf(p[0]);let b=MON.indexOf(p[p.length-1]);if(a<0)return false;if(b<a)return curM>=a||curM<=b;return curM>=a&&curM<=b}
function farmOpen(f){return Object.values(f.w||{}).some(inWin)}
function daysUntil(s){return Math.ceil((new Date(s+'T00:00:00')-midnight)/864e5)}
const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([35.95,-86.7],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
map.createPane('districts'); map.getPane('districts').style.zIndex=350;
const layer=L.layerGroup().addTo(map), evlayer=L.layerGroup().addTo(map), loclayer=L.layerGroup().addTo(map);
function farmVisible(f){if(!withinR(f))return false;if(nowOnly&&!farmOpen(f))return false;if(active.size&&!f.cr.some(c=>active.has(c)))return false;return true}
function draw(){layer.clearLayers();let vis=0;
 FARMS.forEach(f=>{if(!farmVisible(f))return;vis++;let op=farmOpen(f);let hot=active.size&&f.cr.some(c=>active.has(c));
  let m=L.circleMarker([f.lat,f.lon],{radius:op?7:5,color:op?'#ff5a3c':'#4a4853',weight:hot?3:(op?2:1),fillColor:op?'#E64535':'#2b2a33',fillOpacity:op?.9:.6});
  let wl=Object.entries(f.w||{}).map(([k,v])=>k+' <span class=w>('+v+')</span>').join(', ')||f.cr.join(', ');
  let dl=LOC?' &middot; '+Math.round(distF(f))+' mi':'';
  m.bindPopup('<div class=pop><b>'+f.n+'</b><div class=m>'+f.c+(f.co?', '+f.co+' Co.':'')+dl+'</div><div>'+wl+'</div>'+
   (f.ex.length?'<div class=w>'+f.ex.join(' &middot; ')+'</div>':'')+(f.ph?'<div style=margin-top:4px>'+f.ph+'</div>':'')+
   (f.o?'<div class=w style=margin-top:4px>'+f.o+'</div>':'')+'</div>');
  layer.addLayer(m)});
 document.getElementById('fcount').textContent=vis+" farms shown"+(radiusMi?" within "+radiusMi+" mi of "+LOC.label:"")+(active.size?" &middot; "+[...active].join(", "):"");}
function drawEvents(){evlayer.clearLayers();EVENTS.forEach(e=>{if(!e.lat)return;
  let m=L.marker([e.lat,e.lon],{icon:L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:#f0b429;transform:rotate(45deg);border:1px solid #0e0d10;box-shadow:0 0 8px #f0b429aa"></div>',iconSize:[14,14],iconAnchor:[7,7]})});
  m.bindPopup('<div class=pop><b>'+e.name+'</b><div class=m>'+e.date_label+'</div><div class=w>'+e.city+(e.county?', '+e.county+' Co.':'')+'</div><div class=w style=margin-top:3px>'+e.kind+'</div></div>');
  evlayer.addLayer(m)})}
function drawLoc(){loclayer.clearLayers();if(!LOC)return;
  L.circleMarker([LOC.lat,LOC.lon],{radius:6,color:'#f6f1e7',weight:2,fillColor:'#0e0d10',fillOpacity:1}).addTo(loclayer);
  if(radiusMi)L.circle([LOC.lat,LOC.lon],{radius:radiusMi*1609,color:'#f6f1e7',weight:1,opacity:.35,fill:false,dashArray:'4 6'}).addTo(loclayer);}
function titleCase(s){return s.replace(/\b\w/g,c=>c.toUpperCase())}
function statusOf(crop){let r=CAL[crop];if(!r)return{state:'none',label:'in season varies',sort:2.5,order:0};
  let a=r[0],b=r[1];let endDate=new Date(now.getFullYear(),b+1,0),startDate=new Date(now.getFullYear(),a,1);
  let wkLeft=Math.round((endDate-midnight)/(7*864e5)),wkTo=Math.round((startDate-midnight)/(7*864e5));
  if(curM>b)return{state:'gone',label:'back in '+MON[a],sort:4,order:a};
  if(curM<a)return{state:'soon',label:'opens ~'+wkTo+' wk',sort:3,order:wkTo};
  if(wkLeft<=3)return{state:'closing',label:(wkLeft<=0?'final days':'~'+wkLeft+' wk left'),sort:0,order:wkLeft};
  return{state:'peak',label:'~'+wkLeft+' wk left',sort:1,order:wkLeft};}
function cropCount(c){return FARMS.filter(f=>withinR(f)&&f.cr.includes(c)).length}
function buildLedger(){let crops=[...new Set(FARMS.flatMap(f=>f.cr))];
  let rows=crops.map(c=>({c,n:cropCount(c),...statusOf(c)})).filter(r=>r.n>0||!radiusMi);
  rows.sort((x,y)=>x.sort-y.sort||x.order-y.order||y.n-x.n);
  let el=document.getElementById('ledger');el.innerHTML='';
  rows.forEach(r=>{let d=document.createElement('div');d.className='lc lc-'+r.state+(active.has(r.c)?' on':'');
    d.innerHTML='<div class=l><span class=cn>'+titleCase(r.c)+'</span><span class=ct>'+r.n+' farm'+(r.n==1?'':'s')+'</span></div><span class=st>'+r.label+'</span>';
    d.onclick=()=>{if(active.has(r.c))active.delete(r.c);else active.add(r.c);buildLedger();draw();};el.appendChild(d);});}
const up=EVENTS.filter(e=>e.start&&new Date(e.start+'T00:00:00')>=midnight).sort((a,b)=>a.start<b.start?-1:1);
function renderCd(){let w=document.getElementById('cdwrap');if(!up.length){w.innerHTML='';return;}
 let e=up[0];let days=daysUntil(e.start);let strip='';for(let i=0;i<Math.min(days,21);i++)strip+='<i class=on></i>';
 w.innerHTML='<div class=cd><div class=ev>NEXT &mdash; '+e.name+'</div><div class=dt>'+e.date_label+' &middot; '+e.city+'</div><div class=n>'+days+' <small>DAYS</small></div><div class=strip>'+strip+'</div></div>'}
function renderWeekend(){let box=document.getElementById('weekend');if(!LOC){box.innerHTML='';return;}
 let R=radiusMi||60;let html='';
 let evs=up.filter(e=>e.lat&&hav(LOC.lat,LOC.lon,e.lat,e.lon)<=R&&daysUntil(e.start)<=9)
   .map(e=>({e,mi:Math.round(hav(LOC.lat,LOC.lon,e.lat,e.lon))}));
 evs.forEach(o=>{let dd=daysUntil(o.e.start);html+='<div class="wkr ev" data-lat='+o.e.lat+' data-lon='+o.e.lon+'><div><div class=e>'+o.e.name+'</div><div class=s>'+o.e.date_label+' &middot; '+(dd<=0?'on now':'in '+dd+' d')+'</div></div><div class=mi>'+o.mi+' mi</div></div>';});
 let fs=FARMS.filter(f=>farmOpen(f)&&hav(LOC.lat,LOC.lon,f.lat,f.lon)<=R)
   .map(f=>({f,mi:hav(LOC.lat,LOC.lon,f.lat,f.lon)})).sort((a,b)=>a.mi-b.mi).slice(0,6);
 fs.forEach(o=>{let ip=Object.entries(o.f.w||{}).filter(([k,v])=>inWin(v)).map(([k])=>k).slice(0,3).join(', ')||o.f.cr.slice(0,2).join(', ');
   html+='<div class="wkr fm" data-lat='+o.f.lat+' data-lon='+o.f.lon+'><div><div class=e>'+o.f.n+'</div><div class=s>'+o.f.c+' &middot; '+ip+'</div></div><div class=mi>'+Math.round(o.mi)+' mi</div></div>';});
 box.innerHTML=html||'<div class=s style="color:#8a8794;padding:8px 0">Nothing in season or dated within '+R+' mi. Widen the radius.</div>';
 [...box.querySelectorAll('.wkr')].forEach(el=>{el.onclick=()=>map.setView([+el.dataset.lat,+el.dataset.lon],11);});}
function refresh(){drawLoc();buildLedger();draw();renderWeekend();}
// controls
const townSel=document.getElementById('town');
Object.keys(TOWNS).sort((a,b)=>a=='Nashville'?-1:b=='Nashville'?1:a.localeCompare(b)).forEach(t=>{let o=document.createElement('option');o.value=t;o.textContent=t;townSel.appendChild(o);});
townSel.value='Nashville';
townSel.onchange=()=>{let t=townSel.value;LOC={lat:TOWNS[t][0],lon:TOWNS[t][1],label:t};map.setView([LOC.lat,LOC.lon],radiusMi?9:8);refresh();};
document.getElementById('radius').onchange=e=>{radiusMi=+e.target.value;refresh();if(radiusMi&&LOC)map.setView([LOC.lat,LOC.lon],9);};
document.getElementById('geo').onclick=()=>{if(!navigator.geolocation){alert('Geolocation not available');return;}
  navigator.geolocation.getCurrentPosition(p=>{LOC={lat:p.coords.latitude,lon:p.coords.longitude,label:'your location'};
    if(![...townSel.options].some(o=>o.value=='__me')){let o=document.createElement('option');o.value='__me';o.textContent='Your location';townSel.appendChild(o);}
    townSel.value='__me';map.setView([LOC.lat,LOC.lon],10);refresh();},()=>alert('Could not get location'));};
document.getElementById('rst').onclick=()=>{active.clear();buildLedger();draw();};
const nt=document.getElementById('nowtog');nt.onclick=()=>{nowOnly=!nowOnly;nt.classList.toggle('on');draw()};
const el=document.getElementById('evlist');
up.forEach(e=>{let d=document.createElement('div');d.className='evrow';d.innerHTML='<div class=e>'+e.name+'</div><div class=d>'+e.date_label+'</div><div class=l>'+e.city+(e.county?', '+e.county+' Co.':'')+' &middot; '+e.kind+'</div>';d.onclick=()=>{if(e.lat)map.setView([e.lat,e.lon],11);};el.appendChild(d)});
if(!up.length)el.innerHTML='<div class=l style=color:#8a8794>No confirmed upcoming events loaded.</div>';
document.getElementById('foot').innerHTML=FARMS.length+' farms mapped &middot; '+EVENTS.length+' confirmed events. Windows are typical &amp; weather-variable &mdash; confirm before publishing a hard date. Sources: PickYourOwn.ORG, TN Assoc. of Fairs, official event sites.';
// ---- Neighborhood districts (windowed layer, zoom-aware) ----
const OPEN=new Set(DSTATE.open||[]);
const distlayer=L.layerGroup();
const distGeo=L.geoJSON(DISTRICTS,{pane:'districts',style:f=>{let o=OPEN.has(f.properties.district);
    return{color:o?'#ff5a3c':'#6b6556',weight:o?2:1,fillColor:o?'#E64535':'#20222a',fillOpacity:o?0.34:0.16};},
    onEachFeature:(f,l)=>{let o=OPEN.has(f.properties.district);
      l.bindPopup('<div class=pop><b>'+f.properties.district+'</b><div class=w>'+(o?'window open now':'no open window')+'</div></div>');}});
distlayer.addLayer(distGeo);
const distLabels=L.layerGroup(); distlayer.addLayer(distLabels);
function renderDistLabels(){distLabels.clearLayers(); if(map.getZoom()<11) return;
  DISTRICTS.features.forEach(f=>{let o=OPEN.has(f.properties.district);
    L.marker([f.properties.cy,f.properties.cx],{interactive:false,icon:L.divIcon({className:'',iconSize:[0,0],
      html:'<div style="font:700 10px Archivo,sans-serif;letter-spacing:.4px;color:'+(o?'#ff5a3c':'#cbc6bb')+';text-shadow:0 1px 3px #000;white-space:nowrap;transform:translate(-50%,-50%)">'+f.properties.district+'</div>'})}).addTo(distLabels);});}
map.on('zoomend',renderDistLabels); renderDistLabels();
distlayer.addTo(map);
document.getElementById('dstat').innerHTML='Neighborhoods &middot; '+(DSTATE.status||'')+' &middot; <span style="color:#6b6556">zoom in for districts</span>';
const LAYERS=[['Farms',layer,'p0'],['Events',evlayer,'p1'],['Neighborhoods',distlayer,'p2']];
const lyrEl=document.getElementById('lyr');
LAYERS.forEach(a=>{let el=document.createElement('span');el.className='lyrpill on '+a[2];el.textContent=a[0];
  el.onclick=()=>{el.classList.toggle('on');if(map.hasLayer(a[1]))map.removeLayer(a[1]);else a[1].addTo(map);};lyrEl.appendChild(el);});
renderCd();drawEvents();refresh();if(radiusMi&&LOC)map.setView([LOC.lat,LOC.lon],9);
</script></body></html>
